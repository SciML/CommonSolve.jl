name: IntegrationTest
on:
  pull_request:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
  push:
    branches:
      - master
    tags:
      - v*
    paths-ignore:
      - 'docs/**'
  schedule:
    - cron: '1 4 * * 4'

jobs:
  downstream:
    name: ${{ matrix.package.repo }}/${{ matrix.package.group }}/${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        package:
          - {user: SciML, repo: OrdinaryDiffEq.jl, group: InterfaceI}
          - {user: SciML, repo: SciMLBase.jl, group: Core}
          - {user: SciML, repo: DiffEqBase.jl, group: Core}
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    uses: "SciML/.github/.github/workflows/downstream.yml@v1"
    with:
      julia-version: "1"
      owner: "${{ matrix.package.user }}"
      repo: "${{ matrix.package.repo }}"
      group: "${{ matrix.package.group }}"
      os: "${{ matrix.os }}"
    secrets: "inherit"
